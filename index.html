<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Calendário ❤️</title>
    <style>
        body { 
            background: #111; 
            color: white; 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
        }
        
        h1 { color: #ff4d6d; margin-bottom: 5px; }
        p { color: #888; margin-bottom: 30px; }

        .grid {
            display: grid;
            /* Quadrados de 110px para dar um destaque legal */
            grid-template-columns: repeat(auto-fit, 110px);
            gap: 20px;
            justify-content: center;
            max-width: 900px;
            margin: 0 auto;
            perspective: 1000px; /* Cria a profundidade para o giro 3D */
        }

        /* Estrutura do Card (O container do giro) */
        .day-card {
            width: 110px;
            height: 110px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        /* Classe que faz o card virar */
        .day-card.flipped {
            transform: rotateY(180deg);
        }

        /* Comum para as duas faces */
        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* Esconde a face de trás enquanto vira */
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.4rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* FRENTE: Onde fica o número */
        .front {
            background: #222;
            border: 2px solid #333;
            color: #ff4d6d;
        }

        /* Estilo para dias clicáveis (Hoje e Passados) */
        .active .front {
            border-color: #ff4d6d;
            background: #2a2a2a;
        }

        /* VERSO: Onde a foto vai aparecer */
        .back {
            background: #ff4d6d; /* Cor temporária até você por as fotos */
            color: white;
            transform: rotateY(180deg);
            overflow: hidden;
        }

        /* Estilo para a imagem (quando você colocar) */
        .back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Dias Bloqueados (Futuros) */
        .locked {
            opacity: 0.2;
            cursor: not-allowed;
            filter: grayscale(1);
        }

    </style>
</head>
<body>

    <h1>
