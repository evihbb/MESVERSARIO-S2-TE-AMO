<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> MÊSVERSÁRIO DO RUAN ❤️</title>
    <style>
        body { 
            background: #111; 
            color: white; 
            text-align: center; 
            font-family: sans-serif; 
            padding: 20px; 
        }

        h1 { color: #ff4d6d; margin-bottom: 10px; }

        /* Estilo para a sua mensagem especial */
        .mensagem-especial {
            max-width: 800px;
            margin: 0 auto 40px auto;
            line-height: 1.6;
            font-size: 1.1rem;
            color: #eee;
            background: rgba(255, 77, 109, 0.1);
            padding: 20px;
            border-radius: 15px;
            border-left: 4px solid #ff4d6d;
            border-right: 4px solid #ff4d6d;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, 280px);
            gap: 20px;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
            perspective: 4000px; 
        }

        .day-card {
            width: 280px;
            height: 280px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            cursor: pointer;
        }

        .flipped {
            transform: rotateY(180deg);
        }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.4rem;
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .front {
            background: #222;
            border: 2px solid #444;
            color: #ff4d6d;
        }

        .active .front { 
            border-color: #ff4d6d;
            box-shadow: 0 0 10px rgba(255, 77, 109, 0.4);
        }

        .active:hover .front {
            box-shadow: 0 0 20px rgba(255, 77, 109, 0.7);
        }

        .back {
            background: #000;
            transform: rotateY(180deg);
            overflow: hidden;
            border-radius: 15px;
        }

        .flipped .back {
            border: 2px solid #ff4d6d;
            box-shadow: 0 0 10px rgba(255, 77, 109, 0.4);
        }

        .foto {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 13px;
            transform: scale(1);
            transition: transform 0.6s ease;
        }

        .flipped .foto {
            transform: scale(1.08);
        }

        .locked { 
            opacity: 0.2; 
            cursor: not-allowed; 
        }
    </style>
</head>
<body>

<h1>❤️🐈 Mêsversário </h1>

<div class="mensagem-especial">
    Hoje é um dia mais que especial, é dia que uma gatinho nasceu, talvez não tão peludo quanto a Roma, mas tão sapeca quanto, fiz um calendário especial, para um cara especial, um grande amor da minha vida, desejo um ótimo aniversário, Te amo Ruan ❤️
</div>

<p id="status-msg">Toque para virar!</p>

<div class="grid" id="grid"></div>

<script>
    const hojeNum = new Date().getDate();
    const grid = document.getElementById("grid");

    const STORAGE_KEY = "recompensas_ruan_final";
    let dados = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { coletados: [] };

    function renderizar() {
        grid.innerHTML = "";

        for (let i = 1; i <= 30; i++) {
            const card = document.createElement("div");
            card.className = "day-card";
            
            const jaAbriu = dados.coletados.includes(i);
            const podeAbrir = i <= hojeNum;

            if (jaAbriu) card.classList.add("flipped");

            if (podeAbrir) {
                card.classList.add("active");
                card.onclick = () => {
                    if (!dados.coletados.includes(i)) {
                        dados.coletados.push(i);
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(dados));
                        card.classList.add("flipped");
                    }
                };
            } else {
                card.classList.add("locked");
            }

            card.innerHTML = `
                <div class="front">${i}</div>
                <div class="back">
                    <img src="imagens/${i}.jpg" class="foto" loading="lazy" alt="Dia ${i}">
                </div>
            `;

            grid.appendChild(card);
        }
    }

    renderizar();
</script>

</body>
</html>
