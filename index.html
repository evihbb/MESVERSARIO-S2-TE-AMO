    h1 { color: #ff4d6d; }
    
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, 280px);
        gap: 20px;
        justify-content: center;
        max-width: 1200px;
        margin: 0 auto;
        perspective: 4000px; 
    }

    .day-card {
        width: 280px;
        height: 280px;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.6s;
        cursor: pointer;
    }

    .flipped {
        transform: rotateY(180deg);
    }

    .front, .back {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 1.4rem;
    }

    .front {
        background: #222;
        border: 2px solid #444;
        color: #ff4d6d;
    }

    .active .front { border-color: #ff4d6d; }

    .back {
        background: #000;
        transform: rotateY(180deg);
        overflow: hidden;
    }

    /* FOTO */
    .foto {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 15px;
        transform: scale(1);
        transition: transform 0.6s ease;
    }

    /* ZOOM QUANDO VIRA */
    .flipped .foto {
        transform: scale(1.08);
    }

    .locked { 
        opacity: 0.2; 
        cursor: not-allowed; 
    }
</style>

<h1>❤️🐈 Mêsversário </h1>
<p id="status-msg">Toque para virar!</p>

<div class="grid" id="grid"></div>

<script>
    const hojeNum = new Date().getDate();
    const grid = document.getElementById("grid");

    let dados = JSON.parse(localStorage.getItem("recompensas_v_final")) || { coletados: [] };

    function renderizar() {
        grid.innerHTML = "";

        for (let i = 1; i <= 30; i++) {
            const card = document.createElement("div");
            card.className = "day-card";
            
            const jaAbriu = dados.coletados.includes(i);
            if (jaAbriu) card.classList.add("flipped");

            if (i <= hojeNum) {
                card.classList.add("active");

                card.onclick = () => {
                    if (!dados.coletados.includes(i)) {
                        dados.coletados.push(i);
                        localStorage.setItem("recompensas_v_final", JSON.stringify(dados));
                        card.classList.add("flipped");
                    }
                };

            } else {
                card.classList.add("locked");
            }

            card.innerHTML = `
                <div class="front">${i}</div>
                <div class="back">
                    <img src="imagens/${i}.jpg" class="foto">
                </div>
            `;

            grid.appendChild(card);
        }
    }

    renderizar();
</script>
